name: Generate Salesforce Types

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 09:00 KST (00:00 UTC)
  workflow_dispatch:      # 수동 트리거도 가능

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Generate types
        run: npm run generate-types
        env:
          SALESFORCE_END_POINT: ${{ secrets.SALESFORCE_END_POINT }}
          SALESFORCE_CLIENT_ID: ${{ secrets.SALESFORCE_CLIENT_ID }}
          SALESFORCE_CLIENT_SECRET: ${{ secrets.SALESFORCE_CLIENT_SECRET }}
          SALESFORCE_USERNAME: ${{ secrets.SALESFORCE_USERNAME }}
          SALESFORCE_PASSWORD: ${{ secrets.SALESFORCE_PASSWORD }}
          SALESFORCE_SECURITY_TOKEN: ${{ secrets.SALESFORCE_SECURITY_TOKEN }}
      - name: Commit updated types
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add salesforce-types.ts
          git diff --staged --quiet || git commit -m "chore: update salesforce types $(date +'%Y-%m-%d')"
          git push
